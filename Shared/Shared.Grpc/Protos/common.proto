syntax = "proto3";

option csharp_namespace = "BackendUiEval.Grpc";

package common;

enum Person {
  PERSON_UNSPECIFIED = 0;
  PERSON_PERSON1 = 1;
  PERSON_PERSON2 = 2;
}

enum TodoType {
  TODO_TYPE_UNSPECIFIED = 0;
  SHOPPING = 1;
  WORK = 2;
  SPARE_TIME = 3;
}

enum TodoState {
  TODO_STATE_UNSPECIFIED = 0;
  READY = 1;
  IN_PROGRESS = 2;
  DONE = 3;
}
